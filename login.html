<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
}

.loginbox{
width:300px;
margin:100px auto;
background:white;
border:1px solid #aaa;
padding:15px;
}

input{
width:100%;
margin-bottom:10px;
padding:5px;
border:1px solid #888;
}

button{
border:1px solid black;
background:#e0e0e0;
padding:5px;
}

</style>
</head>

<body>

<div class="loginbox">

<h2>Student Login</h2>

<input placeholder="Student ID">
<input type="password" placeholder="Password">

<button>Login</button>

<p><small>Forgot password? Contact your teacher.</small></p>

</div>

</body>
</html>
