<!DOCTYPE html>
<html>
<head>
<title>Teacher Dashboard</title>

<style>
body{font-family:Arial;background:#f2f2f2;}

.container{
width:900px;
margin:30px auto;
background:white;
border:1px solid #aaa;
padding:15px;
}

.panel{
border:1px solid #999;
padding:10px;
margin-bottom:10px;
}

button{
background:#e0e0e0;
border:1px solid black;
padding:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>Teacher Dashboard</h1>

<div class="panel">
<h3>Assignments</h3>
<p>Create and manage classroom assignments.</p>
<button>Create Assignment</button>
</div>

<div class="panel">
<h3>Student Progress</h3>
<p>View grades and completion data.</p>
<button>View Reports</button>
</div>

<div class="panel">
<h3>Upload Worksheets</h3>
<p>Add new printable worksheets for students.</p>
<button>Upload File</button>
</div>

</div>

</body>
</html>
